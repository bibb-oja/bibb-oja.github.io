items:
  - title: "Improving Online Job Advertisement Analysis via Compositional Entity Extraction"
    authors: "Kr{\"u}ger, Kai and Binnewitt, Johanna and Ehmann, Kathrin and Winnige, Stefan and Akbik, Alan"
    year: 2025
    journal: "Proceedings of the 2025 Conference on Empirical Methods in Natural Language Processing"
    doi: "10.18653/v1/2025.emnlp-main.1375"
    description: "We propose a compositional entity modeling framework for requirement extraction from online job advertisements (OJAs), representing complex, tree-like structures that connect atomic entities via typed relations. Based on this schema, we introduce GOJA, a manually annotated dataset of 500 German job ads that captures roles, tools, experience levels, attitudes, and their functional context."
